<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
width:100%;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:#000;
position:relative;
}

/* VIDEO */

#bg-video{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-2;
}

/* LỚP PHỦ */

.overlay{
position:fixed;
inset:0;

background:
linear-gradient(
to bottom,
rgba(0,0,0,.25),
rgba(0,0,0,.65)
);

z-index:-1;
}

/* KHUNG */

.container{

width:90%;
max-width:420px;

padding:40px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.12);

border-radius:24px;

text-align:center;
}

/* TITLE */

.title{

font-size:13px;

letter-spacing:8px;

color:white;

opacity:.8;

margin-bottom:30px;

}

/* INPUT */

input{

width:100%;

padding:18px;

border:none;
outline:none;

border-radius:14px;

background:rgba(255,255,255,.08);

color:white;

font-size:16px;

text-align:center;
}

input::placeholder{
color:rgba(255,255,255,.6);
}

/* BUTTON */

button{

width:100%;

margin-top:15px;

padding:16px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:600;

letter-spacing:2px;

background:white;

color:black;

transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

/* ERROR */

#error{

display:none;

margin-top:15px;

color:#ff8c8c;

font-size:14px;
}

/* SHAKE */

.shake{
animation:shake .35s;
}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}

}

/* FADE */

#fade{

position:fixed;
inset:0;

background:black;

opacity:0;

pointer-events:none;

transition:2s;

z-index:999;
}

#fade.show{
opacity:1;
}

@media(max-width:768px){

.container{
padding:28px;
}

.title{
letter-spacing:5px;
}

}

</style>
</head>

<body>

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="city.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<div id="fade"></div>

<div class="container" id="box">

<div class="title">
SECRET CODE
</div>

<input
id="code"
type="password"
placeholder="Enter Code">

<button onclick="login()">
ENTER
</button>

<div id="error">
Invalid Code
</div>

</div>

<audio id="music">
<source src="denied.mp3" type="audio/mpeg">
</audio>

<script>

const PASSWORD = "252";

function login(){

const value =
document.getElementById("code")
.value
.trim();

if(value === PASSWORD){

startSequence();

}else{

const box =
document.getElementById("box");

document
.getElementById("error")
.style.display = "block";

box.classList.add("shake");

setTimeout(()=>{

box.classList.remove("shake");

},350);

}

}

function startSequence(){

document
.getElementById("fade")
.classList.add("show");

const music =
document.getElementById("music");

music.play().catch(()=>{});

music.onended = ()=>{

window.location.href =
"https://viet69.be/";

};

}

document
.getElementById("code")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){

login();

}

});

</script>

</body>
</html>
