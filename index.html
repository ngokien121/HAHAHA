<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Access</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
width:100%;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

/* Video nền */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Overlay */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

/* Khung */

.container{
width:90%;
max-width:400px;

padding:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:20px;

text-align:center;
}

/* Tiêu đề */

.title{
color:white;
letter-spacing:6px;
margin-bottom:25px;
font-size:14px;
}

/* Input */

input{
width:100%;
padding:16px;

border:none;
outline:none;

border-radius:12px;

background:rgba(255,255,255,.12);

color:white;

text-align:center;
}

/* Nút */

button{
width:100%;
padding:15px;
margin-top:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;
}

/* Error */

#error{
display:none;
margin-top:15px;
color:#ff9a9a;
}

/* Shake */

.shake{
animation:shake .35s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

/* Fade */

#fade{
position:fixed;
inset:0;
background:black;
opacity:0;
pointer-events:none;
transition:2s;
z-index:999;
}

#fade.show{
opacity:1;
}

</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
<source src="city.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div id="fade"></div>

<div class="container" id="box">

<div class="title">
SECRET CODE
</div>

<input
id="code"
type="password"
placeholder="Enter Code">

<button onclick="login()">
ENTER
</button>

<div id="error">
Invalid Code
</div>

</div>

<audio id="music">
<source src="denied.mp3" type="audio/mpeg">
</audio>

<script>

const PASSWORD = "252";
const TARGET_URL = "https://viet69.be";

function login(){

const value =
document.getElementById("code")
.value
.trim();

if(value === PASSWORD){

document
.getElementById("fade")
.classList.add("show");

const music =
document.getElementById("music");

music.play().catch(()=>{});

music.onended = ()=>{

window.location.href =
TARGET_URL;

};

music.onerror = ()=>{

window.location.href =
TARGET_URL;

};

}else{

const box =
document.getElementById("box");

document
.getElementById("error")
.style.display="block";

box.classList.add("shake");

setTimeout(()=>{

box.classList.remove("shake");

},350);

}

}

document
.getElementById("code")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){

login();

}

});

</script>

</body>
</html>
